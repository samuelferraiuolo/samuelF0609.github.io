<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR-Master Hub | Accesso Riservato</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .card { background: #1e293b; border: 1px solid #334155; }
        #qrcode img { margin: 0 auto; border: 10px solid white; border-radius: 8px; }
    </style>
</head>
<body class="p-4 md:p-10 flex items-center justify-center min-h-screen">

    <div id="loginScreen" class="card p-8 rounded-2xl shadow-2xl w-full max-w-md text-center">
        <h1 class="text-3xl font-extrabold text-blue-400 mb-6">QR-MASTER <span class="text-white">HUB</span></h1>
        <p class="text-slate-400 mb-6 text-sm">Accesso Riservato Territori</p>
        
        <div class="space-y-4 text-left">
            <div>
                <label class="block text-sm font-medium mb-1">Username</label>
                <input type="text" id="usernameInput" class="w-full p-3 rounded-lg bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Password</label>
                <input type="password" id="passwordInput" class="w-full p-3 rounded-lg bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <p id="loginError" class="text-red-500 text-sm hidden text-center">Credenziali errate!</p>
            <button onclick="checkLogin()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition-all mt-4">
                Accedi all'Archivio
            </button>
        </div>
    </div>

    <div id="mainApp" class="max-w-6xl mx-auto hidden w-full">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-4xl font-extrabold text-blue-400">QR-MASTER <span class="text-white">HUB</span></h1>
                <p class="text-slate-400 mt-2">Benvenuto, samux06!</p>
            </div>
            
            <div class="flex flex-wrap gap-2">
                <button onclick="exportToWord()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg font-bold text-sm">📄 Esporta in Word</button>
                
                <button onclick="exportData()" class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-lg font-bold text-sm">💾 Esporta Backup (.json)</button>
                <label class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg font-bold text-sm cursor-pointer">
                    📂 Importa Backup
                    <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
                </label>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="card p-6 rounded-2xl shadow-xl h-fit">
                <h2 class="text-xl font-semibold mb-4 border-b border-slate-700 pb-2">Nuovo QR Code</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Nome Territorio</label>
                        <input type="text" id="qrName" placeholder="es. Territorio 1 - Via Roma" class="w-full p-3 rounded-lg bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Link Google Maps</label>
                        <input type="text" id="qrText" placeholder="https://maps.app.goo.gl/..." class="w-full p-3 rounded-lg bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <button onclick="generateAndPreview()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition-all">
                        Genera Anteprima
                    </button>
                </div>

                <div id="previewArea" class="hidden mt-6 text-center">
                    <div id="qrcode" class="mb-4"></div>
                    <div class="flex gap-2">
                        <button onclick="saveToArchive()" class="flex-1 bg-green-600 hover:bg-green-500 py-2 rounded-lg text-sm font-bold">Salva in Archivio</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 card p-6 rounded-2xl shadow-xl">
                <h2 class="text-xl font-semibold mb-4 border-b border-slate-700 pb-2">I Tuoi Territori</h2>
                <div id="archiveGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>
        </div>
    </div>

    <script>
        function checkLogin() {
            const user = document.getElementById('usernameInput').value;
            const pass = document.getElementById('passwordInput').value;
            const errorText = document.getElementById('loginError');

            if (user === 'samux06' && pass === 'TerritoriHelper15') {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.body.classList.remove('flex', 'items-center', 'justify-center', 'min-h-screen');
                renderArchive(); 
            } else {
                errorText.classList.remove('hidden');
            }
        }

        let tempQRData = null;

        function generateAndPreview() {
            const name = document.getElementById('qrName').value;
            const text = document.getElementById('qrText').value;
            if(!name || !text) return alert("Inserisci nome e URL!");

            document.getElementById('previewArea').classList.remove('hidden');
            const qrcodeDiv = document.getElementById('qrcode');
            qrcodeDiv.innerHTML = "";
            
            new QRCode(qrcodeDiv, {
                text: text, width: 200, height: 200,
                colorDark : "#000000", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H
            });

            tempQRData = { name, text, id: Date.now() };
        }

        function saveToArchive() {
            let archive = JSON.parse(localStorage.getItem('myQRs') || "[]");
            archive.push(tempQRData);
            localStorage.setItem('myQRs', JSON.stringify(archive));
            renderArchive();
            resetForm();
        }

        function renderArchive() {
            const container = document.getElementById('archiveGrid');
            const archive = JSON.parse(localStorage.getItem('myQRs') || "[]");
            container.innerHTML = archive.length === 0 ? "<p class='text-slate-500'>Nessun territorio salvato.</p>" : "";

            archive.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-slate-900 p-4 rounded-xl border border-slate-700 flex flex-col items-center";
                card.innerHTML = `
                    <div id="qr-${item.id}" class="bg-white p-2 rounded mb-2"></div>
                    <p class="font-bold text-blue-400 truncate w-full text-center">${item.name}</p>
                    <p class="text-xs text-slate-500 truncate w-full text-center mb-3">${item.text}</p>
                    <div class="flex gap-2 w-full">
                        <button onclick="downloadQR(${item.id}, '${item.name.replace(/'/g, "\\'")}')" class="flex-1 bg-slate-700 hover:bg-slate-600 text-xs py-2 rounded font-bold">Scarica PNG</button>
                        <button onclick="deleteQR(${item.id})" class="bg-red-900 hover:bg-red-800 px-3 py-2 rounded text-xs">Elimina</button>
                    </div>
                `;
                container.appendChild(card);
                
                new QRCode(document.getElementById(`qr-${item.id}`), { text: item.text, width: 120, height: 120 });
            });
        }

        function downloadQR(id, name) {
            const qrDiv = document.getElementById(`qr-${id}`);
            const sourceElement = qrDiv.querySelector('img') || qrDiv.querySelector('canvas');
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            const qrSize = 300; 
            canvas.width = qrSize + 40; 
            canvas.height = qrSize + 100; 
            
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#000000"; 
            ctx.font = "bold 22px Arial"; 
            ctx.textAlign = "center"; 
            ctx.fillText(name, canvas.width / 2, 40); 
            
            ctx.drawImage(sourceElement, 20, 60, qrSize, qrSize);
            
            const link = document.createElement('a');
            link.href = canvas.toDataURL("image/png");
            link.download = `Territorio_${name.replace(/\s+/g, '_')}.png`;
            link.click();
        }

        function deleteQR(id) {
            if(!confirm("Eliminare questo territorio dall'archivio?")) return;
            let archive = JSON.parse(localStorage.getItem('myQRs') || "[]");
            archive = archive.filter(item => item.id !== id);
            localStorage.setItem('myQRs', JSON.stringify(archive));
            renderArchive();
        }

        function resetForm() {
            document.getElementById('qrName').value = "";
            document.getElementById('qrText').value = "";
            document.getElementById('previewArea').classList.add('hidden');
        }

        // === NUOVA FUNZIONE: ESPORTA IN WORD ===
        function exportToWord() {
            let archive = JSON.parse(localStorage.getItem('myQRs') || "[]");
            if(archive.length === 0) {
                alert("Non c'è nessun territorio da esportare!");
                return;
            }

            // Iniziamo a creare la struttura del documento Word in formato HTML
            let htmlContent = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head>
                    <meta charset='utf-8'>
                    <title>I Miei Territori</title>
                </head>
                <body style="font-family: Arial, sans-serif; text-align: center;">
                    <h1 style="color: #333; margin-bottom: 30px;">Archivio Territori</h1>
            `;

            // Aggiungiamo ogni QR Code al documento
            archive.forEach(item => {
                const qrDiv = document.getElementById(`qr-${item.id}`);
                if(qrDiv) {
                    const img = qrDiv.querySelector('img') || qrDiv.querySelector('canvas');
                    let imgData = img.tagName.toLowerCase() === 'canvas' ? img.toDataURL("image/png") : img.src;
                    
                    htmlContent += `
                        <div style="margin-bottom: 50px; page-break-inside: avoid;">
                            <h2 style="margin-bottom: 10px; color: #1e293b;">${item.name}</h2>
                            <img src="${imgData}" width="250" height="250" style="border: 2px solid #ccc; padding: 10px;">
                            <p style="color: #64748b; font-size: 12px; margin-top: 10px;">Link: ${item.text}</p>
                        </div>
                    `;
                }
            });

            htmlContent += `</body></html>`;

            // Creiamo il file .doc e lo scarichiamo (il trucco \ufeff assicura che gli accenti si leggano bene)
            const blob = new Blob(['\ufeff', htmlContent], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'Tutti_i_Territori.doc';
            link.click();
            URL.revokeObjectURL(url);
        }

        // Sistema Esporta/Importa Backup (.json)
        function exportData() {
            const data = localStorage.getItem('myQRs') || "[]";
            const blob = new Blob([data], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = "backup_territori.json";
            link.click();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if(Array.isArray(importedData)) {
                        localStorage.setItem('myQRs', JSON.stringify(importedData));
                        renderArchive();
                        alert("Backup ripristinato con successo!");
                    } else {
                        alert("File non valido.");
                    }
                } catch (error) {
                    alert("Errore nella lettura del file.");
                }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
